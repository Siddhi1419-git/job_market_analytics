name: Trigger Automated Job Market Scraper

on:
  schedule:
    # Runs automatically at 00:00 UTC every single day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the run via the GitHub UI tab

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas

    - name: Execute Scraper Pipeline
      run: python scraper.py

    - name: Commit and Push Raw Scraped Artifacts
      run: |
        git config --global user.name "Automated Data Pipeline"
        git config --global user.email "pipeline@dataengine.internal"
        git add data/raw/*.json pipeline.log
        git diff-index --quiet HEAD || git commit -m "Automated ingestion: Chrono-sync raw payloads"
        git push